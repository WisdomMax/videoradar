<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VideoRadar</title>
    <script>
      fetch("/public/index.html")
        .then((response) => response.text())
        .then((html) => {
          document.open();
          document.write(
            html
              .replace(/href="\/styles\.css(\?v=[\d\.]+)"/g, 'href="/public/styles.css$1"')
              .replace(/src="\/app\.js(\?v=[\d\.]+)"/g, 'src="/public/app.js$1"')
              .replace(/href="\/styles\.css"/g, 'href="/public/styles.css"')
              .replace(/src="\/app\.js"/g, 'src="/public/app.js"')
          );
          document.close();
        })
        .catch(() => {
          document.body.innerHTML = "<main style='font-family:system-ui;padding:32px'>VideoRadar deployment is missing public/index.html.</main>";
        });
    </script>
  </head>
  <body></body>
</html>

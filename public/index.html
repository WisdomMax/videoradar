<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VideoRadar</title>
    <link rel="icon" href="/radar-icon.png" />
    <link rel="apple-touch-icon" href="/radar-icon.png" />
    <link rel="stylesheet" href="/styles.css?v=2.0" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/">
        <img src="/radar-icon.png" alt="Radar" class="brand-icon" />
        <span>
          <strong>VideoRadar</strong>
          <small>유튜브 영상 리서치 레이더</small>
        </span>
      </a>
      <nav aria-label="Primary">
        <a class="active" href="#search" data-view="search">영상 찾기</a>
        <a href="#saved" data-view="saved">수집한 영상</a>
        <a href="#history" data-view="history">검색 히스토리</a>
      </nav>
      <div class="top-actions">
        <span id="apiStatus" class="status">API 확인 중</span>
      </div>
    </header>

    <main>
      <section id="searchPanel" class="search-panel">
        <form id="searchForm" class="search-form">
          <label class="search-box">
            <span>검색어</span>
            <input id="queryInput" type="search" placeholder="단어 또는 문장 입력" autocomplete="off" required />
          </label>
          <div class="search-controls">
            <label>
              <span>정렬</span>
              <select id="orderInput">
                <option value="relevance">관련도</option>
                <option value="viewCount">조회수</option>
                <option value="date">최신순</option>
                <option value="rating">평점</option>
              </select>
            </label>
            <label>
              <span>개수</span>
              <select id="maxInput">
                <option>50</option>
                <option>100</option>
                <option>200</option>
                <option selected>300</option>
                <option>500</option>
              </select>
            </label>
            <button type="submit">검색</button>
            <button id="forceSearchButton" type="button" class="btn-refresh">
              다시검색
              <span class="refresh-tooltip">YouTube를 다시 검색합니다.<br>캐시를 무시하고 최신 결과를 가져옵니다.</span>
            </button>
          </div>
        </form>
        <div class="tools" style="display:none">
          <button id="clearButton" type="button" style="display:none">필터 초기화</button>
        </div>
      </section>

      <section class="metrics" aria-label="검색 요약">
        <article>
          <span>검색 결과</span>
          <strong id="metricCount">0</strong>
        </article>
        <article>
          <span>총 조회수</span>
          <strong id="metricViews">0</strong>
        </article>
        <article>
          <span>평균 조회수</span>
          <strong id="metricAverage">0</strong>
        </article>
        <article>
          <span>중앙값</span>
          <strong id="metricMedian">0</strong>
        </article>
        <article>
          <span>Shorts</span>
          <strong id="metricShorts">0</strong>
        </article>
      </section>

      <section class="workspace">
        <aside id="filtersPanel" class="filters" aria-label="필터">
          <div class="filter-header">
            <h2>필터 설정 <span id="filteredCount" style="font-size: 12px; font-weight: normal; color: var(--muted); margin-left: 8px;">0개</span></h2>
            <button id="toggleFilters" type="button" class="mobile-only-inline close-btn">✕</button>
          </div>
          <div id="filtersContent">
          <label>
            <span>결과 내 검색</span>
            <input id="innerSearch" type="search" placeholder="제목 + 채널명" />
          </label>
          <label>
            <span>조회수 범위</span>
            <div class="range-inputs">
              <input id="minViews" type="number" min="0" placeholder="최소" />
              <input id="maxViews" type="number" min="0" placeholder="최대" />
            </div>
          </label>
          <fieldset>
            <legend>기여도</legend>
            <div id="contributionFilters" class="grade-grid"></div>
          </fieldset>
          <fieldset>
            <legend>성과도</legend>
            <div id="performanceFilters" class="grade-grid"></div>
          </fieldset>
          <fieldset>
            <legend>형식</legend>
            <div class="check-group">
              <label class="check"><input id="shortsOnly" type="checkbox" /> Shorts만</label>
              <label class="check"><input id="excludeShorts" type="checkbox" /> Shorts 제외</label>
            </div>
          </fieldset>
          </div>
          <div class="filter-footer">
            <button id="clearButton2" type="button" class="btn-filter-reset">필터 초기화</button>
          </div>
        </aside>
        <div id="overlay" class="overlay"></div>

        <section class="results" aria-label="검색 결과">
          <div class="table-actions">
            <div>
              <h1 id="pageTitle">영상 찾기</h1>
              <p id="resultHint">YouTube API 키를 연결한 뒤 키워드를 검색하세요.</p>
            </div>
            <div class="results-top-buttons">
              <button id="mobileFilterButton" type="button" class="mobile-only">필터</button>
              <button id="exportButton" type="button">CSV 내보내기</button>
            </div>
          </div>
          <div id="tableWrap" class="table-wrap">
            <table id="resultsTable">
              <thead id="resultsHead">
                <tr>
                  <th>선택</th>
                  <th>썸네일</th>
                  <th data-sort="title">제목</th>
                  <th data-sort="views">조회수</th>
                  <th data-sort="subscribers">구독자</th>
                  <th data-sort="contribution">기여도</th>
                  <th data-sort="performance">성과도</th>
                  <th data-sort="exposure">노출 확률</th>
                  <th data-sort="totalChannelVideos">총 영상 수</th>
                  <th data-sort="publishedAt">게시일</th>
                </tr>
              </thead>
              <tbody id="resultsBody"></tbody>
            </table>
          </div>
        </section>
      </section>
    </main>

    <div id="loadingModal" class="loading-modal">
      <div class="loading-content">
        <div class="radar-loader">
          <div class="radar-beam"></div>
          <div class="radar-ring"></div>
          <div class="radar-ring"></div>
          <div class="radar-ring"></div>
          <div class="radar-point" style="top: 20%; left: 30%;"></div>
          <div class="radar-point" style="top: 50%; left: 70%;"></div>
          <div class="radar-point" style="top: 70%; left: 40%;"></div>
          <div class="radar-center"></div>
        </div>
        <p>데이터를 정밀 분석 중입니다...</p>
      </div>
    </div>

    <template id="gradeTemplate">
      <button type="button" class="grade-filter"></button>
    </template>

    <script src="/app.js?v=2.0" type="module"></script>
  </body>
</html>
